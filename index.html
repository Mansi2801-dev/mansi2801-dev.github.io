<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mansi Saxena | Portfolio</title>
        <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: #06060a; /* Your dark background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            background: #1e1e2f; /* Darker card color */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
        }
        h1 { color: #ffffff; margin-bottom: 10px; }
        h3 { color: #ffffff; margin-top: 20px; } /* Makes "Let's Connect" visible */
        p { color: #b0b0b0; font-size: 1.1rem; }
        
        .links { margin-top: 30px; }
        
        /* Button Styles with Glow */
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-weight: bold;
            margin: 8px;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }
        .btn:hover { 
            background: #2980b9; 
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.6); 
            transform: translateY(-2px);
        }
        
        .btn-alt { 
            background: #2ecc71; 
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        } 
        .btn-alt:hover { 
            background: #27ae60; 
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.6); 
        }

        .footer { margin-top: 40px; font-size: 0.8rem; color: #666; }
        hr { border: 0; border-top: 1px solid #333; margin: 30px 0; }
    </style>

</head>
<body>

    <div class="container">
        <h1>Hi, I'm Mansi Saxena 👋</h1>
        <p>I'm a passionate developer building cool things and hosting them here on GitHub Pages.</p>
        
        <div class="links">
            <a href="https://github.com/Mansi2801-dev" class="btn" target="_blank">View My GitHub</a>
        </div>

        <hr>

        <h3>Let's Connect</h3>
        <div class="links">
            <a href="mailto:saxenamansi804@gmail.com" class="btn btn-alt">Email Me</a>
            <a href="www.linkedin.com/in/mansi-saxena-543a5a331" class="btn btn-alt" target="_blank">LinkedIn</a>
        </div>

        <div class="footer">
            Built with ❤️ by Mansi Saxena
        </div>
    </div>

</body>
</html>
