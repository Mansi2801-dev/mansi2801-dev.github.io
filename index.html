<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* This is the CSS (styling) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 1.1rem; }
        .links { margin-top: 30px; }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s ease;
            font-weight: bold;
        }
        .btn:hover { background: #2980b9; }
        .footer { margin-top: 40px; font-size: 0.8rem; color: #bdc3c7; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hi, I'm [Your Name] 👋</h1>
        <p>Welcome to my personal website hosted on GitHub Pages. I am a passionate developer currently building cool things.</p>
        
        <div class="links">
            <!-- Replace the '#' with your actual GitHub link -->
            <a href="https://github.com" class="btn">View My GitHub</a>
        </div>

        <div class="footer">
            Built with ❤️ using GitHub Pages
        </div>
    </div>

</body>
</html>
